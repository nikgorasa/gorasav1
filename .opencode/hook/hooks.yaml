hooks:
  - event: file.changed
    scope: all
    conditions:
      - matchesCodeFiles
    actions:
      - bash:
          command: "cd gorasa-next && npx tsc --noEmit"
          timeout: 30000

  - event: file.changed
    scope: main
    actions:
      - bash:
          command: |
            echo '=== GoRASA Documentation Check (Strict) ==='
            cd gorasa-next
            MISSING=0
            for f in CHANGE-LOG.md ../MEMORY.md ../LEARNING-FROM-MISTAKES.md ../DEPLOYMENT_LOG.md ../CONFIG-REFERENCE.md; do
              if [ ! -f "$f" ]; then
                echo "❌ MISSING: $f"
                MISSING=1
              fi
            done
            if [ $MISSING -eq 1 ]; then
              echo "❌ FAIL: One or more governance docs missing"
              exit 1
            else
              echo "✅ All 7 governance docs present"
            fi
          timeout: 10000

  - event: session.idle
    scope: main
    actions:
      - bash:
          command: "echo '=== GoRASA Governance Post-Task ===' && cd gorasa-next && bash scripts/post-task-check.sh && echo '=== Done ==='"
          timeout: 15000
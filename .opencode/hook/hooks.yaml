hooks:
  # ═══════════════════════════════════════════════════════
  # COMMAND GUARD — blocks dangerous commands before they run
  # ═══════════════════════════════════════════════════════
  # This hook runs before ANY bash command to check if it's safe.
  # Blocks: vercel deploy, rm .env, git push --force, etc.
  # See DEPLOY.md for full list of blocked commands.
  # ═══════════════════════════════════════════════════════

  - event: pre_tool_use
    scope: main
    conditions:
      - tool: bash
    actions:
      - bash:
          command: "bash /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/scripts/command-guard.sh \"${TOOL_INPUT_command}\""
          timeout: 5000

  # ═══════════════════════════════════════════════════════
  # BRANCH PROTECTION GUARD — NEVER BYPASS
  # ═══════════════════════════════════════════════════════
  # This hook runs on EVERY session start and idle to verify
  # that main and qa branch protection is active.
  # NEVER remove branch protection. Use PRs for all merges.
  # If protection is missing, run: bash scripts/restore-protection.sh
  # ═══════════════════════════════════════════════════════

  - event: session.start
    scope: main
    actions:
      - bash:
          command: "echo '═══ BRANCH PROTECTION GUARD ═══' && bash /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/scripts/branch-protection-guard.sh --check-all"
          timeout: 30000

  - event: session.idle
    scope: main
    actions:
      - bash:
          command: "bash /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/scripts/branch-protection-guard.sh --check-all"
          timeout: 30000

  # ═══════════════════════════════════════════════════════
  # SESSION START — Pre-Flight Check (COMPULSORY)
  # ═══════════════════════════════════════════════════════
  - event: session.start
    scope: main
    actions:
      - bash:
          command: "echo '═══ GoRASA SESSION START ═══' && bash /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/scripts/preflight-check.sh"
          timeout: 120000

  # ═══════════════════════════════════════════════════════
  # FILE CHANGED — TypeScript Check
  # ═══════════════════════════════════════════════════════
  - event: file.changed
    scope: all
    conditions:
      - matchesCodeFiles
    actions:
      - bash:
          command: "cd /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/gorasa-next && npx tsc --noEmit"
          timeout: 30000

  # ═══════════════════════════════════════════════════════
  # FILE CHANGED — Example file secret scan
  # ═══════════════════════════════════════════════════════
  - event: file.changed
    scope: all
    conditions:
      - glob: "**/*.example"
    actions:
      - bash:
          command: "echo '═══ GoRASA EXAMPLE FILE CHANGE — Secret Scan ═══' && bash /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/gorasa-next/scripts/preflight-check.sh"
          timeout: 60000

  # ═══════════════════════════════════════════════════════
  # FILE CHANGED — Documentation Check (Strict)
  # ═══════════════════════════════════════════════════════
  - event: file.changed
    scope: main
    actions:
      - bash:
          command: |
            echo '=== GoRASA Documentation Check (Strict) ==='
            cd /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main
            MISSING=0
            for f in DEPLOY.md CHANGE-LOG.md MEMORY.md LEARNING-FROM-MISTAKES.md DEPLOYMENT_LOG.md CONFIG-REFERENCE.md Sprint-1.md; do
              if [ ! -f "$f" ]; then
                echo "❌ MISSING: $f"
                MISSING=1
              fi
            done
            if [ $MISSING -eq 1 ]; then
              echo "❌ FAIL: One or more governance docs missing"
              exit 1
            else
              echo "✅ All governance docs present"
            fi
          timeout: 10000

  # ═══════════════════════════════════════════════════════
  # SESSION IDLE — Post-Task Check (COMPULSORY)
  # ═══════════════════════════════════════════════════════
  - event: session.idle
    scope: main
    actions:
      - bash:
          command: "echo '═══ GoRASA SESSION IDLE — POST-TASK CHECK ═══' && bash /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/scripts/post-task-check.sh"
          timeout: 180000

  # ═══════════════════════════════════════════════════════
  # SESSION END — Final Post-Task Check (COMPULSORY)
  # ═══════════════════════════════════════════════════════
  - event: session.end
    scope: main
    actions:
      - bash:
          command: "echo '═══ GoRASA SESSION END — FINAL CHECK ═══' && bash /home/nikhil/Downloads/Gorasa/App-1/rasa-zero-app-main/scripts/post-task-check.sh && echo '═══ SESSION COMPLETE ═══'"
          timeout: 180000
